name: FGI Daily Update

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run (YYYY-MM-DD)'
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Get target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target_date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "target_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
      
      - name: Run FGI daily update
        env:
          FGI_PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python -m fgi.output.daily_run --date ${{ steps.date.outputs.target_date }}
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: fgi-results-${{ steps.date.outputs.target_date }}
          path: |
            data/fgi.db
            output/

      - name: Commit updated DB back to repo
        if: github.event_name == 'schedule'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fgi.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit"
          else
            git commit -m "chore(db): daily update for ${{ steps.date.outputs.target_date }} [skip ci]"
            git push
          fi
