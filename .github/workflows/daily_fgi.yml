name: Daily FGI

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  run-fgi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          pip install akshare

      - name: Run daily FGI
        env:
          FGI_PUSHPLUS_TOKEN: ${{ secrets.FGI_PUSHPLUS_TOKEN }}
        run: python -m fgi.output.daily_run

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: fgi-data
          path: fgi_data.db
          retention-days: 7
